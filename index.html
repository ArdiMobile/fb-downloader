<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YasinG Downloader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { font-family: Arial; margin: 0; }

.hero {
    background: #0b0d11;
    color: white;
    text-align: center;
    padding: 100px 20px;
}

.search-area {
    background: white;
    padding: 6px;
    border-radius: 50px;
    display: flex;
    max-width: 600px;
    margin: 20px auto;
}

.search-area input {
    flex: 1;
    border: none;
    padding: 15px;
    outline: none;
}

.btn-dl {
    background: #2d6df6;
    color: white;
    border: none;
    width: 50px;
    border-radius: 50%;
}

#preview {
    max-width: 600px;
    margin: auto;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Facebook Video Downloader</h1>

    <form id="dlForm" class="search-area">
        <input type="text" id="urlInput" placeholder="Paste video URL...">
        <button type="submit" class="btn-dl">
            <i class="fas fa-search"></i>
        </button>
    </form>

    <!-- PREVIEW HERE -->
    <div id="preview"></div>
</div>

<script src="script.js"></script>

</body>
</html>
